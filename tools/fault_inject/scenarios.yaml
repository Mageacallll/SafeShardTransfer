scenarios:
  - name: drop_transfer_shard_message
    description: Drop TransferShard so reconfiguration safely aborts back to STABLE.
    setup:
      shard_id: s1
      initial_owner: A
      target_owner: B
      initial_epoch: 1
      initial_data:
        k: v
    liveness:
      transfer_timeout: 2
      max_retries: 1
    inject:
      type: drop_message
      message_type: TransferShard
    expected:
      safety:
        at_most_one_stable_owner: true
        no_reassign_complete: true
        no_activate_complete: true
      final_metadata:
        owner: A
        state: STABLE
        epoch: 2

  - name: old_owner_crash_during_freeze
    description: Crash the old owner before freeze is acknowledged.
    setup:
      shard_id: s1
      initial_owner: A
      target_owner: B
      initial_epoch: 1
      initial_data:
        k: v
    liveness:
      freeze_timeout: 2
      max_retries: 1
    inject:
      type: crash_node
      node_id: A
      at_time: 2
    expected:
      safety:
        at_most_one_stable_owner: true
        no_reassign_complete: true
      final_metadata:
        owner: A
        state: STABLE
        epoch: 2

  - name: new_owner_crash_before_transfer_ack
    description: Crash the new owner before TransferShard can be processed and acknowledged.
    setup:
      shard_id: s1
      initial_owner: A
      target_owner: B
      initial_epoch: 1
      initial_data:
        k: v
    liveness:
      transfer_timeout: 2
      max_retries: 1
    inject:
      type: crash_node
      node_id: B
      at_time: 5
    expected:
      safety:
        at_most_one_stable_owner: true
        no_reassign_complete: true
      final_metadata:
        owner: A
        state: STABLE
        epoch: 2

  - name: false_suspicion_safe_reconfig
    description: Trigger unnecessary reassignment of a healthy old owner.
    setup:
      shard_id: s1
      initial_owner: A
      target_owner: B
      initial_epoch: 1
      initial_data:
        k: v
    liveness:
      freeze_timeout: 2
      transfer_timeout: 2
      max_retries: 1
    inject:
      type: false_suspicion
      trigger_reassign: true
    expected:
      safety:
        at_most_one_stable_owner: true
        reassign_complete: true
      final_metadata:
        owner: B
        state: STABLE
        epoch: 2

  - name: cascading_drop_then_old_owner_crash
    description: Drop transfer messages and crash old owner during in-flight reconfiguration.
    setup:
      shard_id: s1
      initial_owner: A
      target_owner: B
      initial_epoch: 1
      initial_data:
        k: v
    liveness:
      transfer_timeout: 2
      max_retries: 1
    inject:
      type: cascading
      events:
        - type: drop_message
          message_type: TransferShard
        - type: crash_node
          node_id: A
          at_time: 4
    expected:
      safety:
        at_most_one_stable_owner: true
        no_reassign_complete: true
      final_metadata:
        owner: A
        state: STABLE
        epoch: 2

  - name: partition_then_recover
    description: Temporarily partition coordinator and old owner, then heal and complete.
    setup:
      shard_id: s1
      initial_owner: A
      target_owner: B
      initial_epoch: 1
      initial_data:
        k: v
    liveness:
      freeze_timeout: 2
      max_retries: 3
    inject:
      type: partition
      links:
        - source: coord
          dest: A
          start_time: 2
          end_time: 8
        - source: A
          dest: coord
          start_time: 2
          end_time: 8
    expected:
      safety:
        at_most_one_stable_owner: true
        reassign_complete: true
      final_metadata:
        owner: B
        state: STABLE
        epoch: 2

  - name: reorder_and_duplicate_transfer_path
    description: Apply reordering and duplication on transfer-related links.
    setup:
      shard_id: s1
      initial_owner: A
      target_owner: B
      initial_epoch: 1
      initial_data:
        k: v
    liveness:
      freeze_timeout: 2
      transfer_timeout: 2
      max_retries: 2
    inject:
      type: link_noise
      links:
        - source: A
          dest: B
          reorder_enabled: true
          duplicate_rate: 0.5
        - source: B
          dest: coord
          reorder_enabled: true
          duplicate_rate: 0.5
    expected:
      safety:
        at_most_one_stable_owner: true